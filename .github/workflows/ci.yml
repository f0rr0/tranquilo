name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run test
      - run: bun run build

  repo-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run generate:check
      - run: bun run sherif
      - run: bun run actions:lint
      - run: bun run knip:check

  commitlint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run commitlint -- --from "${{ github.event.pull_request.base.sha }}" --to "${{ github.event.pull_request.head.sha }}"

  changeset:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run changeset:check
        env:
          CHANGESET_BASE_REF: ${{ github.event.pull_request.base.sha }}
          CHANGESET_HEAD_REF: ${{ github.event.pull_request.head.sha }}

  pr-preview:
    if: github.event_name == 'pull_request'
    needs: [test, repo-checks, commitlint, changeset]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run release:package:pr
      - name: Prepare PR artifact names
        run: |
          mkdir -p dist-preview
          cp apps/cli/dist-release/tranquilo-darwin-arm64.tar.gz "dist-preview/tranquilo-pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}-tranquilo-darwin-arm64.tar.gz"
          cp apps/cli/dist-release/tranquilo-darwin-x64.tar.gz "dist-preview/tranquilo-pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}-tranquilo-darwin-x64.tar.gz"
          cp apps/cli/dist-release/checksums.txt "dist-preview/tranquilo-pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}-checksums.txt"
      - uses: actions/upload-artifact@v7
        with:
          name: tranquilo-pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}-tranquilo-darwin-arm64.tar.gz
          path: dist-preview/tranquilo-pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}-tranquilo-darwin-arm64.tar.gz
          retention-days: 14
      - uses: actions/upload-artifact@v7
        with:
          name: tranquilo-pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}-tranquilo-darwin-x64.tar.gz
          path: dist-preview/tranquilo-pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}-tranquilo-darwin-x64.tar.gz
          retention-days: 14
      - uses: actions/upload-artifact@v7
        with:
          name: tranquilo-pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}-checksums.txt
          path: dist-preview/tranquilo-pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}-checksums.txt
          retention-days: 14
      - uses: actions/github-script@v9
        with:
          script: |
            const marker = "<!-- tranquilo-pr-preview -->";
            const pr = context.payload.pull_request.number;
            const body = [
              marker,
              "## Tranquilo PR preview",
              "",
              "Install the latest macOS preview build for this PR:",
              "",
              "```sh",
              `curl -fsSL https://tranquilo-ai.vercel.app/pr/${pr}/install.sh | sh`,
              "```",
              "",
              "Preview builds are macOS-only and expire with GitHub Actions artifact retention.",
            ].join("\n");
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
              per_page: 100,
            });
            const existing = comments.data.find((comment) =>
              comment.body?.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr,
                body,
              });
            }
